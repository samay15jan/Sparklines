name: Sparklines TUI Release

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
            -f TUI/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/sparklines-tui:latest \
            TUI

      - name: Push Image
        run: |
          docker push \
            ghcr.io/${{ github.repository_owner }}/sparklines-tui:latest
